theme = "catppuccin_mocha"

[editor]
line-number = "relative"
cursorline = true
cursorcolumn = false
color-modes = true
true-color = true
scrolloff = 5
mouse = true

auto-format = true
auto-save = false


[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"


[editor.file-picker]
hidden = false
git-ignore = true


[editor.lsp]
display-messages = true
auto-signature-help = true


[editor.whitespace.render]
space = "none"
tab = "none"
newline = "none"


[editor.statusline]
left   = ["mode"]
center = ["file-name"]
right  = ["version-control", "diagnostics", "position"]


separator = " • "


mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"
